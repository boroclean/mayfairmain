name: Scrape GlobeAir

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Setup and Connect NordVPN
      run: |
        # Install NordVPN
        wget -qO - https://repo.nordvpn.com/gpg/nordvpn_public.asc | sudo apt-key add -
        echo "deb https://repo.nordvpn.com/deb/nordvpn/debian stable main" | sudo tee /etc/apt/sources.list.d/nordvpn.list
        sudo apt-get update
        sudo apt-get install -y nordvpn
        
        # Start NordVPN service
        sudo service nordvpn start
        sleep 5
        
        # Log in and connect
        sudo nordvpn login --token "${{ secrets.NORDVPN_TOKEN }}"
        sudo nordvpn connect France
        
    - name: Run Scraper
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: npx tsx src/scripts/scrape_globeair.ts

    - name: Disconnect VPN
      if: always()
      run: sudo nordvpn disconnect || true
