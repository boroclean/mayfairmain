name: Scrape GlobeAir

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Needed to push changes back

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Scraper
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: npx tsx src/scripts/scrape_globeair.ts

    - name: Commit and Push Activity Log
      if: always() # Run even if scrape fails
      run: |
        if [ -f SCRAPER_ACTIVITY.md ]; then
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add SCRAPER_ACTIVITY.md
          git commit -m "Update scraper activity log [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Failed to push"
        else
          echo "No activity log file found to commit."
        fi
